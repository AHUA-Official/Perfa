version: '3.8'

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
      - ../assets/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../assets/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ../assets/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  grafana-storage:
