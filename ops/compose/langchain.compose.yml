version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: perfa-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma_data
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - PERSIST_DIRECTORY=/chroma/chroma_data
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    networks:
      - perfa-network

volumes:
  chroma_data:
    driver: local

networks:
  perfa-network:
    driver: bridge
